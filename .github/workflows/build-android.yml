name: Build Android (signed release)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload.jks
          echo "keystore bytes: $(wc -c < android/app/upload.jks)"

      - name: Build release APK and AAB
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Sign APK (zipalign + apksigner)
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          echo "Using build-tools: $BT"
          UNSIGNED=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Unsigned APK: $UNSIGNED"
          "$BT/zipalign" -v -p 4 "$UNSIGNED" aligned.apk
          "$BT/apksigner" sign \
            --ks android/app/upload.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out splpro.apk aligned.apk
          "$BT/apksigner" verify --verbose splpro.apk

      - name: Sign AAB (jarsigner)
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "AAB: $AAB"
          # убрать возможную debug-подпись перед подписанием upload-ключом
          zip -q -d "$AAB" 'META-INF/*.RSA' 'META-INF/*.SF' 'META-INF/*.DSA' 2>/dev/null || true
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/app/upload.jks \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            "$AAB" "$KEY_ALIAS"
          cp "$AAB" splpro.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splpro-release
          path: |
            splpro.apk
            splpro.aab

      - name: Publish to Release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: SPLPRO latest build
          files: |
            splpro.apk
            splpro.aab
          body: |
            Подписанная release-сборка SPLPRO.
            • splpro.apk — установка напрямую на Android.
            • splpro.aab — загрузка в Google Play Console.
