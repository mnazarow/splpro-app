name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk splpro.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: splpro-apk
          path: splpro.apk

      - name: Publish to Release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: SPLPRO latest build
          files: splpro.apk
          body: |
            Автоматическая сборка приложения SPLPRO (debug APK).
            Скачайте splpro.apk и установите на Android.
